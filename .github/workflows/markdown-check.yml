name: Markdown CI

on:
  push:
    branches:
      - release-v1.0

jobs:
  validate-markdown:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Check for Markdown file
        run: |
          if [ -f "README.md" ]; then
            echo "README.md exists ✅"
          else
            echo "README.md is missing ❌"
            exit 1
          fi
