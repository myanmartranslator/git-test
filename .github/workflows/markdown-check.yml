name: Markdown CI

on:
  push:
    branches:
      - release-v1.0

jobs:
  validate-markdown:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Check for Markdown file
        run: |
          if [ -f "README.md" ]; then
            echo "README.md exists ✅"
          else
            echo "README.md is missing ❌"
            exit 1
          fi

  deploy:
      needs: validate-markdown  # Only runs if validate-markdown succeeds
      runs-on: ubuntu-latest
      steps:
        - name: Checkout repository
          uses: actions/checkout@v3
  
        - name: Install Pandoc
          run: sudo apt-get install pandoc
  
        - name: Convert Markdown to HTML
          run: |
            mkdir public
            pandoc README.md -o public/index.html
            
        - name: Deploy to GitHub Pages
          uses: peaceiris/actions-gh-pages@v3
          with:
            personal_token: ${{ secrets.TEST2 }}  # ✅ use this if you added a PAT
            publish_dir: ./public
            publish_branch: gh-pages
            allow_empty_commit: false
            keep_files: false
            force_orphan: false
            enable_jekyll: false
            disable_nojekyll: false
            exclude_assets: .github
